<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VendoMas</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#1a1a2e;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial,sans-serif;
    }
    .card {
      background:#fff;
      border-radius:20px;
      padding:32px 24px;
      width:100%;
      max-width:360px;
      text-align:center;
    }
    .logo { font-size:42px; font-weight:700; color:#1a1a2e; margin-bottom:4px; }
    .logo span { color:#27ae60; }
    .subtitulo { font-size:13px; color:#888; margin-bottom:32px; }
    label { font-size:12px; font-weight:600; color:#555; display:block; text-align:left; margin-bottom:6px; letter-spacing:0.5px; }
    input {
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1.5px solid #e0e0e0;
      font-size:18px;
      text-align:center;
      margin-bottom:20px;
      outline:none;
    }
    input:focus { border-color:#185FA5; }
    button {
      width:100%;
      padding:15px;
      background:#185FA5;
      border:none;
      border-radius:12px;
      color:#fff;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
    }
    .error { font-size:13px; color:#e74c3c; margin-top:12px; display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vendo<span>Mas</span></div>
    <p class="subtitulo">App de Gestión para tu Negocio</p>  

    <label>Nombre de la Empresa</label>
    <input type="text" id="input-negocio"
      placeholder=""
      maxlength="40"/>

    <label>Número de Celular</label>    
    <input type="tel" id="input-telefono"
      placeholder=""  
      maxlength="15"
      inputmode="numeric"/>

    <button onclick="ingresar()">Ingresar →</button>
    <p class="error" id="error-msg">Ingresá tu número de celular</p>  
  </div>

  <script>
    const SUPABASE_URL = 'https://hscvjeyepeogpaqtutni.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bPdXXh9QywZH53mSH55MRA_6NDU-WkZ';

    // Al cargar verificamos si ya hay sesión guardada
    window.addEventListener('load', () => {
      const sesion = localStorage.getItem('vendomas_pwa_sesion');
      if (sesion) {
        window.location.href = 'index.html';
        return;
      }
      // Autocompletar número si ya lo ingresó antes
      const telGuardado = localStorage.getItem('vendomas_telefono');
      if (telGuardado) {
        document.getElementById('input-telefono').value = telGuardado;
      }
    });

    // Genera o recupera el UUID de este navegador
    function obtenerUuidPwa() {
      let uuid = localStorage.getItem('vendomas_uuid_pwa');
      if (!uuid) {
        uuid = 'pwa_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        localStorage.setItem('vendomas_uuid_pwa', uuid);
      }
      return uuid;
    }

    async function ingresar() {
      const telefono = document.getElementById('input-telefono').value.trim();
      const negocio  = document.getElementById('input-negocio').value.trim();
      const errorMsg = document.getElementById('error-msg');

      if (!negocio) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Ingresá el nombre de tu negocio';
        return;
      }

      if (!telefono || telefono.length < 6) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Ingresá un número válido';
        return;
      }

      errorMsg.style.display = 'none';
      const btn = document.querySelector('button');
      btn.textContent = 'Verificando...';
      btn.disabled = true;

      try {
        const uuidPwa = obtenerUuidPwa();

        // Buscamos si el teléfono ya existe en Supabase
        const r = await fetch(
          `${SUPABASE_URL}/rest/v1/dispositivos?telefono=eq.${encodeURIComponent(telefono)}&select=id,uuid_pwa,bloqueado,suscripcion,dias_prueba,fecha_registro`,
          {
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            }
          }
        );
        const data = await r.json();

        if (data && data.length > 0) {
          const registro = data[0];

          // Verificamos si está bloqueado manualmente por el admin
          if (registro.bloqueado === true) {
            mostrarBloqueo('Tu acceso fue bloqueado. Contactá a soporte.');
            return;
          }

          // Verificamos si la prueba gratuita venció
          if (registro.suscripcion === 'prueba') {
            const fechaRegistro   = new Date(registro.fecha_registro);
            const ahora            = new Date();
            const diasTranscurridos = Math.floor((ahora - fechaRegistro) / (1000 * 60 * 60 * 24));
            const diasRestantes     = registro.dias_prueba - diasTranscurridos;

            if (diasRestantes <= 0) {
              mostrarBloqueo('Tu período de prueba gratuita venció. Contactá a soporte para activar tu cuenta.');
              return;
            }
          }

          // Si tiene uuid_pwa y no coincide con el actual → posible uso en otro dispositivo
          if (registro.uuid_pwa && registro.uuid_pwa !== uuidPwa) {
            mostrarBloqueo('Este número ya está registrado en otro dispositivo. Contactá a soporte.');
            return;
          }

          // Actualizamos uuid_pwa y ultimo_acceso
          await fetch(
            `${SUPABASE_URL}/rest/v1/dispositivos?id=eq.${registro.id}`,
            {
              method: 'PATCH',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                uuid_pwa: uuidPwa,
                ultimo_acceso: new Date().toISOString()
              })
            }
          );

        } else {
          // Primera vez — registramos el dispositivo
          await fetch(
            `${SUPABASE_URL}/rest/v1/dispositivos`,
            {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                uuid: uuidPwa,
                uuid_pwa: uuidPwa,
                telefono: telefono,
                marca: 'PWA',
                modelo: navigator.userAgent.slice(0, 80),
                negocio: negocio,
                bloqueado: false,
                fecha_registro: new Date().toISOString(),
                ultimo_acceso: new Date().toISOString()
              })
            }
          );
        }

        // Calculamos los días restantes para guardarlos en la sesión
        let diasRestantesGuardar = null;
        if (data && data.length > 0 && data[0].suscripcion === 'prueba') {
          const fechaRegistro     = new Date(data[0].fecha_registro);
          const ahora              = new Date();
          const diasTranscurridos  = Math.floor((ahora - fechaRegistro) / (1000 * 60 * 60 * 24));
          diasRestantesGuardar     = data[0].dias_prueba - diasTranscurridos;
        }

        // Guardamos sesión localmente
        localStorage.setItem('vendomas_pwa_sesion', JSON.stringify({
          telefono: telefono,
          uuid: uuidPwa,
          nombreNegocio: negocio,
          suscripcion: (data && data.length > 0) ? data[0].suscripcion : 'prueba',
          diasRestantes: diasRestantesGuardar,
          timestamp: Date.now()
        }));
        localStorage.setItem('vendomas_telefono', telefono);

        // Vamos a la app
        window.location.href = 'index.html';

      } catch(e) {
        console.error('Error login:', e);
        btn.textContent = 'Ingresar →';
        btn.disabled = false;
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Error de conexión. Verificá tu internet.';
      }
    }

    function mostrarBloqueo(mensaje) {
      document.querySelector('.card').innerHTML = `
        <div style="font-size:48px;margin-bottom:16px">🔒</div>
        <p style="font-size:18px;font-weight:700;color:#c0392b;margin-bottom:10px">Acceso bloqueado</p>
        <p style="font-size:13px;color:#666;margin-bottom:24px;line-height:1.6">${mensaje}</p>
        <button onclick="window.open('https://wa.me/5493804887124')" style="background:#25D366;border-radius:12px;padding:15px;width:100%;border:none;color:#fff;font-size:16px;font-weight:600;cursor:pointer">
          📱 Contactar por WhatsApp
        </button>
      `;
    }
  </script>
</body>
</html>
