<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VendoMas</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#1a1a2e;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial,sans-serif;
    }
    .card {
      background:#fff;
      border-radius:20px;
      padding:32px 24px;
      width:100%;
      max-width:360px;
      text-align:center;
    }
    .logo { font-size:42px; font-weight:700; color:#1a1a2e; margin-bottom:4px; }
    .logo span { color:#27ae60; }
    .subtitulo { font-size:13px; color:#888; margin-bottom:32px; }
    label { font-size:12px; font-weight:600; color:#555; display:block; text-align:left; margin-bottom:6px; letter-spacing:0.5px; }
    input {
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1.5px solid #e0e0e0;
      font-size:18px;
      text-align:center;
      margin-bottom:20px;
      outline:none;
    }
    input:focus { border-color:#185FA5; }
    button {
      width:100%;
      padding:15px;
      background:#185FA5;
      border:none;
      border-radius:12px;
      color:#fff;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
    }
    .error { font-size:13px; color:#e74c3c; margin-top:12px; display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vendo<span>Mas</span></div>
    <p class="subtitulo">App de Gestión para tu Negocio</p>

    <label>Ingrese su Numero de Celular</label>
    <input type="tel" id="input-telefono"
      placeholder="Ej: 3804111522"
      maxlength="15"
      inputmode="numeric"/>

    <button onclick="ingresar()">Ingresar →</button>
    <p class="error" id="error-msg">Ingresá tu número de celular</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://hscvjeyepeogpaqtutni.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bPdXXh9QywZH53mSH55MRA_6NDU-WkZ';

    // Al cargar, verificamos si ya hay sesión guardada
    window.addEventListener('load', () => {
      const sesion = localStorage.getItem('vendomas_pwa_sesion');
      if (sesion) {
        // Ya tiene sesión, vamos directo a la app
        window.location.href = 'index.html';
      }
    });

    async function ingresar() {
      const telefono = document.getElementById('input-telefono').value.trim();
      const errorMsg = document.getElementById('error-msg');

      if (!telefono || telefono.length < 8) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Ingresá un número válido';
        return;
      }

      errorMsg.style.display = 'none';
      const btn = document.querySelector('button');
      btn.textContent = 'Verificando...';
      btn.disabled = true;

      try {
        // Generamos UUID único para este navegador
        let uuidPwa = localStorage.getItem('vendomas_uuid_pwa');
        if (!uuidPwa) {
          uuidPwa = 'pwa_' + Date.now() + '_' + Math.random().toString(36).slice(2);
          localStorage.setItem('vendomas_uuid_pwa', uuidPwa);
        }

        // Verificamos si el teléfono ya existe en Supabase
        const r = await fetch(`${SUPABASE_URL}/rest/v1/dispositivos?telefono=eq.${telefono}&select=uuid_pwa,bloqueado,suscripcion,dias_prueba`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const data = await r.json();

        if (data.length > 0) {
          // El teléfono ya existe
          const registro = data[0];

          // Verificamos si está bloqueado
          if (registro.bloqueado) {
            mostrarBloqueo();
            return;
          }

          // Verificamos que el UUID coincida
          if (registro.uuid_pwa && registro.uuid_pwa !== uuidPwa) {
            mostrarBloqueo();
            return;
          }

          // Si no tenía uuid_pwa, lo actualizamos
          if (!registro.uuid_pwa) {
            await fetch(`${SUPABASE_URL}/rest/v1/dispositivos?telefono=eq.${telefono}`, {
              method: 'PATCH',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ uuid_pwa: uuidPwa, ultimo_acceso: new Date().toISOString() })
            });
          }

        } else {
          // Primera vez, lo registramos
          await fetch(`${SUPABASE_URL}/rest/v1/dispositivos`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              uuid: uuidPwa,
              uuid_pwa: uuidPwa,
              telefono: telefono,
              marca: 'PWA',
              modelo: navigator.userAgent.slice(0, 50),
              negocio: 'VendoMas',
              fecha_registro: new Date().toISOString(),
              ultimo_acceso: new Date().toISOString()
            })
          });
        }

        // Guardamos la sesión localmente
        localStorage.setItem('vendomas_pwa_sesion', JSON.stringify({
          telefono: telefono,
          uuid: uuidPwa,
          timestamp: Date.now()
        }));

        // Guardamos el teléfono para autocompletar la próxima vez
        localStorage.setItem('vendomas_telefono', telefono);

        // Vamos a la app
        window.location.href = 'index.html';

      } catch(e) {
        btn.textContent = 'Ingresar →';
        btn.disabled = false;
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Error de conexión. Verificá tu internet.';
      }
    }

    function mostrarBloqueo() {
      document.querySelector('.card').innerHTML = `
        <div style="font-size:48px;margin-bottom:16px">🔒</div>
        <p style="font-size:18px;font-weight:700;color:#c0392b;margin-bottom:10px">Acceso bloqueado</p>
        <p style="font-size:13px;color:#666;margin-bottom:24px;line-height:1.6">
          Tu acceso fue bloqueado o este número ya está registrado en otro dispositivo.
          Contactá a soporte para resolverlo.
        </p>
        <button onclick="window.open('https://wa.me/5491130960864')" style="background:#25D366">
          📱 Contactar por WhatsApp
        </button>
      `;
    }

    // Autocompletar el número si ya lo ingresó antes
    const telGuardado = localStorage.getItem('vendomas_telefono');
    if (telGuardado) {
      document.getElementById('input-telefono').value = telGuardado;
    }
  </script>
</body>
</html>
